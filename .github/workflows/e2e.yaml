name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - '**/*.md'

env:
  GO_VERSION: "1.21.0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: kind
          config: test/e2e/kind-config.yaml

      - name: Build images
        run: |
          make docker-build OPERATOR_IMG=ghcr.io/cloudtty/cloudshell-operator:e2e TTY_IMG=ghcr.io/cloudtty/cloudshell:e2e

      - name: Load images into kind
        run: |
          kind load docker-image ghcr.io/cloudtty/cloudshell-operator:e2e --name kind
          kind load docker-image ghcr.io/cloudtty/cloudshell:e2e --name kind

      - name: Run E2E tests
        run: |
          go test ./test/e2e/ -v -ginkgo.v -timeout 30m

      - name: Export kind logs on failure
        if: failure()
        run: |
          kind export logs --name kind ./kind-logs

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kind-logs
          path: ./kind-logs
